<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign In · SMS Automation</title>
    <link rel="icon" type="image/svg+xml" href="/assets/police-insignia.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/theme.css" />
    <style>
      body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
      .gate-shell { width: min(400px, 100%); padding: 32px; border-radius: 24px; }
      .brand-row { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
      .brand-logo { width: 40px; height: 40px; object-fit: contain; flex-shrink: 0; }
      .brand-title { font-size: 16px; font-weight: 800; }
      .brand-sub { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
      .gate-heading { font-size: 26px; font-weight: 800; letter-spacing: -0.04em; }
      .gate-sub { margin-top: 8px; color: var(--text-secondary); line-height: 1.5; font-size: 13px; }
      .form-group { margin-top: 16px; display: grid; gap: 6px; }
      .form-label { font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
      .form-actions { margin-top: 20px; display: grid; gap: 10px; }
      .error-msg { margin-top: 12px; padding: 10px 14px; border-radius: 12px; background: var(--danger-bg); color: var(--danger); font-size: 13px; border: 1px solid rgba(255,109,127,0.18); display: none; }
      .success-banner { padding: 10px 14px; border-radius: 12px; background: var(--success-bg); color: var(--success); font-size: 13px; border: 1px solid rgba(86,216,139,0.18); margin-bottom: 20px; display: none; }
      .footer-link { margin-top: 18px; text-align: center; font-size: 13px; color: var(--text-secondary); }
      .footer-link a { color: var(--accent); text-decoration: none; font-weight: 700; }
      .back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); background: none; border: none; cursor: pointer; padding: 0; margin-bottom: 18px; font: inherit; }
      .back-btn:hover { color: var(--text-primary); }
      .mfa-input { font-family: var(--font-mono); font-size: 24px; font-weight: 800; letter-spacing: 0.2em; text-align: center; }
      .mfa-hint { margin-top: 10px; font-size: 12px; color: var(--text-muted); line-height: 1.6; }
      .btn-loading { opacity: 0.7; pointer-events: none; }
    </style>
  </head>
  <body>
    <div class="gate-shell glass-panel">
      <div class="brand-row">
        <img class="brand-logo" src="/assets/police-insignia.svg" alt="Bangladesh Police" />
        <div>
          <div class="brand-title">SMS Automation</div>
          <div class="brand-sub">LIC Barishal</div>
        </div>
      </div>

      <!-- Step 1: Email + password -->
      <div id="stepPassword">
        <div id="verifiedBanner" class="success-banner">Email verified — you can now sign in.</div>
        <div class="gate-heading">Sign in</div>
        <div class="gate-sub">Use your officer account email and password.</div>
        <form id="loginForm" onsubmit="submitLogin(event)">
          <div class="form-group">
            <label class="form-label" for="loginEmail">Email</label>
            <input id="loginEmail" class="input-field" type="email" autocomplete="email" required placeholder="officer@example.com" />
          </div>
          <div class="form-group">
            <label class="form-label" for="loginPassword">Password</label>
            <input id="loginPassword" class="input-field" type="password" autocomplete="current-password" required placeholder="••••••••" />
          </div>
          <div id="loginError" class="error-msg"></div>
          <div class="form-actions">
            <button id="loginBtn" class="btn-primary" type="submit">Continue</button>
          </div>
        </form>
        <div class="footer-link">No account? <a href="/register.html">Register</a></div>
      </div>

      <!-- Step 2: MFA code -->
      <div id="stepMfa" style="display:none">
        <button class="back-btn" type="button" onclick="backToPassword()">← Back</button>
        <div class="gate-heading">Verification code</div>
        <div class="gate-sub">A 6-digit code was emailed to <strong id="mfaEmailHint"></strong>. Check your inbox (and spam).</div>
        <form id="mfaForm" onsubmit="submitMfa(event)">
          <div class="form-group">
            <label class="form-label" for="mfaCode">6-digit code</label>
            <input id="mfaCode" class="input-field mfa-input" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" required placeholder="000000" />
          </div>
          <div id="mfaError" class="error-msg"></div>
          <div class="form-actions">
            <button id="mfaBtn" class="btn-primary" type="submit">Verify and sign in</button>
          </div>
        </form>
        <div class="mfa-hint">Code expires in 10 minutes. Click Back to resend.</div>
      </div>
    </div>

    <script>
      'use strict';

      // Skip login page if already authenticated.
      (function checkExistingSession() {
        const token = localStorage.getItem('sessionToken');
        const raw = localStorage.getItem('sessionUser');
        if (!token || !raw) return;
        try {
          const user = JSON.parse(raw);
          redirectByRole(user.role);
        } catch (_) {}
      })();

      // Show "email verified" banner when redirected from verify-email.
      if (new URLSearchParams(location.search).get('verified') === '1') {
        document.getElementById('verifiedBanner').style.display = 'block';
      }

      let pendingToken = null;

      function redirectByRole(role) {
        if (role === 'super_admin' || role === 'admin') {
          location.replace('/admin');
        } else {
          location.replace('/');
        }
      }

      async function submitLogin(event) {
        event.preventDefault();
        const btn = document.getElementById('loginBtn');
        const errorEl = document.getElementById('loginError');
        errorEl.style.display = 'none';
        btn.classList.add('btn-loading');
        btn.textContent = 'Sending code…';
        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({
              email: document.getElementById('loginEmail').value.trim(),
              password: document.getElementById('loginPassword').value
            })
          });
          const data = await res.json();
          if (!res.ok) {
            errorEl.textContent = data.error || 'Login failed.';
            errorEl.style.display = 'block';
            return;
          }
          pendingToken = data.pendingToken;
          document.getElementById('mfaEmailHint').textContent =
            document.getElementById('loginEmail').value.trim();
          document.getElementById('stepPassword').style.display = 'none';
          document.getElementById('stepMfa').style.display = 'block';
          document.getElementById('mfaCode').focus();
        } catch (_) {
          errorEl.textContent = 'Network error — check your connection.';
          errorEl.style.display = 'block';
        } finally {
          btn.classList.remove('btn-loading');
          btn.textContent = 'Continue';
        }
      }

      async function submitMfa(event) {
        event.preventDefault();
        const btn = document.getElementById('mfaBtn');
        const errorEl = document.getElementById('mfaError');
        errorEl.style.display = 'none';
        btn.classList.add('btn-loading');
        btn.textContent = 'Verifying…';
        try {
          const res = await fetch('/api/auth/mfa/verify', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({
              pendingToken,
              code: document.getElementById('mfaCode').value.trim()
            })
          });
          const data = await res.json();
          if (!res.ok) {
            errorEl.textContent = data.error || 'Incorrect code.';
            errorEl.style.display = 'block';
            return;
          }
          localStorage.setItem('sessionToken', data.token);
          localStorage.setItem('sessionUser', JSON.stringify(data.user));
          redirectByRole(data.user.role);
        } catch (_) {
          errorEl.textContent = 'Network error — check your connection.';
          errorEl.style.display = 'block';
        } finally {
          btn.classList.remove('btn-loading');
          btn.textContent = 'Verify and sign in';
        }
      }

      function backToPassword() {
        pendingToken = null;
        document.getElementById('stepMfa').style.display = 'none';
        document.getElementById('stepPassword').style.display = 'block';
        document.getElementById('mfaCode').value = '';
        document.getElementById('mfaError').style.display = 'none';
      }
    </script>
  </body>
</html>
