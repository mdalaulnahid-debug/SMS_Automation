# nginx config for the SMS automation backend.
# Placeholders YOUR_DOMAINS (space-separated server_name list) and
# YOUR_CERT_NAME (the certbot lineage directory under /etc/letsencrypt/live/)
# are replaced by scripts/setup-ssl.sh.
# Do not edit this file directly on the VPS; edit the source and re-deploy.
#
# Open to all IPs, protected only by the admin API key (src/auth.js) — there
# is no IP allowlist. Gateway phones need their endpoints reachable from
# mobile networks with no fixed IP, and the admin console is accessed from
# more than one location, so IP-restricting it isn't practical here.

# Redirect plain HTTP → HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAINS;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — TLS termination proxy to Node.js on localhost:3000
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAINS;

    ssl_certificate     /etc/letsencrypt/live/YOUR_CERT_NAME/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_CERT_NAME/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_tickets       off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options            DENY                                  always;
    add_header X-Content-Type-Options     nosniff                               always;
    add_header Referrer-Policy            no-referrer                           always;

    client_max_body_size 20m;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    30s;
        proxy_connect_timeout  5s;
    }
}
