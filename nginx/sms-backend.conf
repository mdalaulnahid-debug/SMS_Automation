# nginx config for the SMS automation backend.
# Domain placeholder: YOUR_DOMAIN is replaced by scripts/setup-ssl.sh
# ADMIN_IP placeholder is replaced at deploy time.
# Do not edit this file directly on the VPS; edit the source and re-deploy.

# Redirect plain HTTP → HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — TLS termination proxy to Node.js on localhost:3000
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_tickets       off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options            DENY                                  always;
    add_header X-Content-Type-Options     nosniff                               always;
    add_header Referrer-Policy            no-referrer                           always;

    client_max_body_size 20m;

    # ── Shared proxy settings ─────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout    30s;
    proxy_connect_timeout  5s;

    # ── OPEN to all IPs — gateway phones need these from mobile networks ──────
    #
    # /api/gateway/jobs        — phone polls for pending SMS jobs
    # /api/gateway/jobs/*/ack  — phone ACKs a sent/failed job
    # /api/gateway/watchdog    — phone reports unauthorized SMS
    # /api/gateways/register   — phone registers its IP:port on startup
    # /api/sms/inbound         — phone posts received operator reply
    # /api/sms/delivery        — phone posts SMS sent/delivered status
    # /api/health              — phone "Test Connection" button
    # /api/app/version         — phone checks for OTA update
    # /api/app/apk             — phone downloads OTA update

    location ~ ^/api/gateway {
        proxy_pass http://127.0.0.1:3000;
    }

    location = /api/health {
        proxy_pass http://127.0.0.1:3000;
    }

    location ~ ^/api/sms/(inbound|delivery)$ {
        proxy_pass http://127.0.0.1:3000;
    }

    location ~ ^/api/app/(version|apk)$ {
        proxy_pass http://127.0.0.1:3000;
    }

    # ── RESTRICTED — admin dashboard and admin API ────────────────────────────
    #
    # Only the admin WiFi IP(s) and localhost (Telegram bridge) can reach:
    #   /            — dashboard HTML
    #   /app.js      — dashboard JS
    #   /setup       — initial setup page
    #   /api/dashboard, /api/gateways, /api/users, /api/audit/*,
    #   /api/requests, /api/reply-drafts/*, /api/admin/*, etc.
    #
    # To add more admin IPs, copy the "allow X.X.X.X;" pattern below.

    location / {
        allow 127.0.0.1;       # localhost — Telegram bridge (same VPS)
        allow ::1;             # localhost IPv6
        allow ADMIN_IP;        # admin WiFi (set by setup-ssl.sh or deploy.sh)
        deny  all;             # everyone else gets 403

        proxy_pass http://127.0.0.1:3000;
    }
}
